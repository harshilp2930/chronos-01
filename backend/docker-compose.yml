version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: chronos1-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chronos1
    ports:
      - "5432:5432"
    volumes:
      - chronos1_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chronos1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chronos1_pgdata:
